# author: jf

services:
  mysql:
    image: mysql:8.4
    container_name: spring-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: resume-builder
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: spring-ai-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: resume-builder
      POSTGRES_USER: pgvector
      POSTGRES_PASSWORD: pgvector
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgvector -d resume-builder"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
  pgvector_data:
